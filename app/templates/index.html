<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaReader 4K</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto p-6">
        <h1 class="text-4xl font-bold mb-8 text-orange-500">📚 MangaReader 4K</h1>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            {% for manga in manga_list %}
            <a href="/manga/{{ manga }}" class="bg-gray-800 rounded-lg p-4 hover:bg-gray-700 transition">
                <div class="text-center font-semibold">{{ manga.replace('_', ' ') }}</div>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
