<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaReader 4K - Библиотека</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-900 text-white min-h-screen" x-data="libraryApp()">
    
    <!-- Навигация -->
    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold text-orange-500">📚 MangaReader 4K</h1>
                <span class="text-gray-500">|</span>
                <span class="text-sm text-gray-400">
                    📖 <span x-text="manga_list.length"></span> манги
                </span>
            </div>
            
            <div class="flex items-center gap-4">
                <!-- Поиск -->
                <div class="relative">
                    <input 
                        type="text" 
                        x-model="searchQuery"
                        placeholder="Поиск..." 
                        class="bg-gray-700 border border-gray-600 rounded px-4 py-2 text-sm focus:outline-none focus:border-orange-500 w-64"
                    >
                    <svg class="w-4 h-4 absolute right-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
                
                <!-- 🔹 Кнопка скачивания -->
                <a href="/download" 
                   class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-sm font-medium transition flex items-center gap-2">
                    <span>📥</span>
                    <span class="hidden md:inline">Скачать</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-8">
        
        <!-- 🔹 Фильтры (убрано разделение downloaded/local) -->
        <div class="flex gap-3 mb-6">
            <button @click="filter = 'all'" 
                    :class="filter === 'all' ? 'bg-orange-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-4 py-2 rounded text-sm font-medium transition">
                Все (<span x-text="manga_list.length"></span>)
            </button>
            <button @click="filter = 'completed'" 
                    :class="filter === 'completed' ? 'bg-green-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-4 py-2 rounded text-sm font-medium transition">
                ✅ Скачанные полностью (<span x-text="manga_list.filter(m => m.completed).length"></span>)
            </button>
            <button @click="filter = 'inprogress'" 
                    :class="filter === 'inprogress' ? 'bg-yellow-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-4 py-2 rounded text-sm font-medium transition">
                ⏳ В процессе (<span x-text="manga_list.filter(m => m.in_progress).length"></span>)
            </button>
            <button @click="filter = 'upscaled'" 
                    :class="filter === 'upscaled' ? 'bg-purple-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-4 py-2 rounded text-sm font-medium transition">
                ✨ 4K (<span x-text="manga_list.filter(m => m.upscaled).length"></span>)
            </button>
        </div>

        <!-- Пустое состояние -->
        <div x-show="filteredManga.length === 0" class="text-center py-20">
            <p class="text-gray-400 text-lg">📭 Ничего не найдено</p>
            <p class="text-sm text-gray-500 mt-2">
                <span x-show="searchQuery">Попробуйте другой поисковый запрос</span>
                <span x-show="!searchQuery && filter !== 'all'">Сбросьте фильтры</span>
                <span x-show="!searchQuery && filter === 'all'">
                    <a href="/download" class="text-orange-500 hover:underline">Скачать мангу</a>
                </span>
            </p>
        </div>

        <!-- Сетка манги -->
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4">
            <template x-for="manga in filteredManga" :key="manga.slug">
                <a :href="`/manga/${manga.slug}`" 
                   class="bg-gray-800 rounded-lg overflow-hidden hover:bg-gray-700 hover:scale-105 transition duration-300 group block shadow-lg relative">
                    
                    <!-- Обложка -->
                    <div class="aspect-[2/3] bg-gray-700 relative overflow-hidden">
                        <img :src="manga.cover || 'https://via.placeholder.com/200x300?text=No+Cover'" 
                             class="w-full h-full object-cover group-hover:scale-110 transition duration-300"
                             @error="this.src='https://via.placeholder.com/200x300?text=Error'"
                             :alt="manga.title">
                        
                        <!-- 🔹 Бейдж 4K -->
                        <div class="absolute top-2 right-2">
                            <span x-show="manga.upscaled" 
                                  class="bg-gradient-to-r from-purple-600 to-pink-600 text-white text-xs font-bold px-2 py-1 rounded shadow">
                                ✨ 4K
                            </span>
                        </div>
                        
                        <!-- 🔹 Бейдж статуса скачивания -->
                        <div class="absolute top-2 left-2">
                            <span x-show="manga.completed" 
                                  class="bg-green-600 text-white text-xs px-2 py-1 rounded font-bold shadow"
                                  title="Скачано полностью">
                                ✓
                            </span>
                            <span x-show="manga.in_progress && !manga.completed" 
                                  class="bg-yellow-600 text-white text-xs px-2 py-1 rounded font-bold shadow"
                                  :title="`Скачано ${manga.completed_chapters || 0} из ${manga.total_chapters || '?'}`">
                                ⏳
                            </span>
                        </div>
                        
                        <!-- Прогресс бар (для незавершённых) -->
                        <div x-show="manga.in_progress && !manga.completed" 
                             class="absolute bottom-0 left-0 right-0 h-1 bg-gray-900">
                            <div class="h-full bg-yellow-500 transition-all" 
                                 :style="`width: ${manga.progress || 0}%`"></div>
                        </div>
                        
                        <!-- Градиент -->
                        <div class="absolute bottom-0 left-0 right-0 h-20 bg-gradient-to-t from-gray-900 to-transparent"></div>
                    </div>
                    
                    <!-- Инфо -->
                    <div class="p-3">
                        <h3 class="font-bold text-sm line-clamp-2 mb-2 group-hover:text-orange-400 transition" 
                            x-text="manga.title"></h3>
                        
                        <!-- Жанры -->
                        <div class="flex flex-wrap gap-1 mb-2">
                            <template x-for="genre in (manga.genres || []).slice(0, 2)" :key="genre">
                                <span class="text-[10px] bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded" 
                                      x-text="genre"></span>
                            </template>
                            <span x-show="(manga.genres || []).length > 2" 
                                  class="text-[10px] bg-gray-700 text-gray-400 px-1.5 py-0.5 rounded">
                                +<span x-text="(manga.genres || []).length - 2"></span>
                            </span>
                        </div>
                        
                        <!-- Статус и главы -->
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span x-text="manga.status || 'Неизвестно'"></span>
                            <span x-show="manga.total_chapters" class="text-gray-400">
                                📖 <span x-text="manga.completed_chapters || manga.total_chapters"></span>/<span x-text="manga.total_chapters"></span>
                            </span>
                        </div>
                    </div>
                </a>
            </template>
        </div>
    </div>

    <script>
    function libraryApp() {
        return {
            manga_list: [],
            searchQuery: '',
            filter: 'all',  // all, completed, in_progress, upscaled
            
            async init() {
                await this.loadMangaList();
            },
            
            async loadMangaList() {
                try {
                    const res = await fetch('/api/manga/list');
                    if (res.ok) {
                        const data = await res.json();
                        this.manga_list = data.manga_list || [];
                    }
                } catch (e) {
                    console.error('Ошибка загрузки:', e);
                }
            },
            
            get filteredManga() {
                let filtered = this.manga_list;
                
                // 🔹 Фильтр по статусу скачивания
                if (this.filter === 'completed') {
                    filtered = filtered.filter(m => m.completed);
                } else if (this.filter === 'inprogress') {
                    filtered = filtered.filter(m => m.in_progress && !m.completed);
                } else if (this.filter === 'upscaled') {
                    filtered = filtered.filter(m => m.upscaled);
                }
                
                // 🔹 Поиск
                if (this.searchQuery.trim()) {
                    const query = this.searchQuery.toLowerCase();
                    filtered = filtered.filter(m => 
                        m.title.toLowerCase().includes(query) ||
                        (m.genres || []).some(g => g.toLowerCase().includes(query))
                    );
                }
                
                return filtered;
            }
        }
    }
    </script>
</body>
</html>
